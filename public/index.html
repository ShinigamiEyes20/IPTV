<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TV Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07080d;
  --surface:#0e1018;
  --surface2:#161822;
  --border:rgba(255,255,255,0.06);
  --accent:#e8372a;
  --accent2:#ff6b5e;
  --text:#f0eee8;
  --muted:#5a5870;
  --muted2:#3a3850;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

/* Layout */
.app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:56px 1fr;height:100vh}

/* Header */
header{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  z-index:10;
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;
  letter-spacing:0.12em;
  color:var(--text);
}
.logo em{color:var(--accent);font-style:normal}

.header-right{display:flex;align-items:center;gap:14px}

.live-badge{
  display:flex;align-items:center;gap:6px;
  font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--accent2);
  font-weight:500;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.ch-count{font-size:12px;color:var(--muted);font-weight:400}

/* Sidebar */
.sidebar{
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.search-wrap{padding:12px;border-bottom:1px solid var(--border)}

.search{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 12px;
  color:var(--text);
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:border-color .2s;
}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--muted)}

.channel-list{flex:1;overflow-y:auto;padding:4px 0}
.channel-list::-webkit-scrollbar{width:3px}
.channel-list::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:3px}

.group-label{
  padding:12px 14px 4px;
  font-size:9px;text-transform:uppercase;letter-spacing:0.18em;
  color:var(--muted);font-weight:500;
}

.ch-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .12s,border-color .12s;
}
.ch-item:hover{background:var(--surface2)}
.ch-item.active{
  background:rgba(232,55,42,0.08);
  border-left-color:var(--accent);
}

.ch-num{
  font-size:10px;color:var(--muted);
  font-family:monospace;min-width:26px;
}

.ch-logo{
  width:30px;height:30px;border-radius:5px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:var(--muted);
  overflow:hidden;flex-shrink:0;
}
.ch-logo img{width:100%;height:100%;object-fit:cover}

.ch-name{
  flex:1;font-size:13px;font-weight:400;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Player */
.player-wrap{
  display:flex;flex-direction:column;
  background:#000;
  position:relative;
  overflow:hidden;
}

#video{width:100%;height:100%;object-fit:contain;display:block}

.loading-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;gap:20px;
  transition:opacity .4s;
}
.loading-screen.hidden{opacity:0;pointer-events:none}

.spinner{
  width:40px;height:40px;
  border:2px solid var(--muted2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;letter-spacing:0.12em;
  color:var(--muted);
}

/* Bottom bar */
.now-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:14px 20px;
  background:linear-gradient(transparent, rgba(0,0,0,0.9));
  display:flex;align-items:center;justify-content:space-between;
  opacity:0;transition:opacity .3s;
}
.player-wrap:hover .now-bar{opacity:1}

.np-left{display:flex;align-items:center;gap:12px}
.np-badge{
  font-size:9px;text-transform:uppercase;letter-spacing:0.14em;
  padding:3px 8px;border-radius:4px;
  background:var(--accent);color:#fff;font-weight:600;
}
.np-title{font-size:15px;font-weight:500}
.np-group{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}

.np-controls{display:flex;gap:8px}
.np-btn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:7px;
  color:#fff;padding:6px 14px;
  font-size:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:background .15s;
}
.np-btn:hover{background:rgba(255,255,255,0.2)}

.error-screen{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:#000;gap:12px;text-align:center;padding:2rem;
}
.error-screen.show{display:flex}
.error-icon{font-size:36px;color:var(--accent)}
.error-msg{font-size:14px;color:var(--muted);max-width:280px;line-height:1.6}
.retry-btn{
  margin-top:8px;
  background:var(--accent);border:none;border-radius:8px;
  color:#fff;padding:8px 20px;font-size:13px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;
  transition:opacity .2s;
}
.retry-btn:hover{opacity:.85}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">JET<em>TV</em></div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div> Live</div>
      <div class="ch-count" id="chCount">Loading...</div>
    </div>
  </header>

  <div class="sidebar">
    <div class="search-wrap">
      <input class="search" id="search" type="text" placeholder="Search channels..." oninput="filterChannels()"/>
    </div>
    <div class="channel-list" id="channelList"></div>
  </div>

  <div class="player-wrap">
    <video id="video" autoplay playsinline></video>

    <div class="loading-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div class="loading-title">Loading Channels...</div>
    </div>

    <div class="error-screen" id="errorScreen">
      <div class="error-icon">&#9888;</div>
      <div class="np-title" id="errorTitle">Stream unavailable</div>
      <div class="error-msg" id="errorMsg">This channel may be offline or geo-restricted.</div>
      <button class="retry-btn" onclick="retryStream()">Try Again</button>
    </div>

    <div class="now-bar">
      <div class="np-left">
        <div class="np-badge">Live</div>
        <div>
          <div class="np-title" id="npTitle">—</div>
          <div class="np-group" id="npGroup">—</div>
        </div>
      </div>
      <div class="np-controls">
        <button class="np-btn" onclick="prevCh()">&#9664; Prev</button>
        <button class="np-btn" onclick="nextCh()">Next &#9654;</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script>
let allChannels = [];
let filtered = [];
let activeIdx = -1;
let hls = null;

function parseM3U(txt) {
  const lines = txt.split(/\r?\n/);
  const out = [];
  let cur = null;
  lines.forEach(line => {
    line = line.trim();
    if (line.startsWith('#EXTINF')) {
      cur = { name: '', group: 'General', logo: '', url: '' };
      const nm = line.match(/,(.+)$/);
      if (nm) cur.name = nm[1].trim();
      const gr = line.match(/group-title="([^"]*)"/i);
      if (gr) cur.group = gr[1] || 'General';
      const lg = line.match(/tvg-logo="([^"]*)"/i);
      if (lg) cur.logo = lg[1];
    } else if (line && !line.startsWith('#') && cur) {
      cur.url = line;
      out.push(cur);
      cur = null;
    }
  });
  return out;
}

function renderList() {
  const list = document.getElementById('channelList');
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--muted)">No channels found</div>';
    return;
  }
  const groups = {};
  filtered.forEach((ch, i) => {
    if (!groups[ch.group]) groups[ch.group] = [];
    groups[ch.group].push({ ...ch, fi: i });
  });
  let html = '';
  let num = 1;
  for (const [grp, chs] of Object.entries(groups)) {
    html += `<div class="group-label">${grp}</div>`;
    chs.forEach(ch => {
      const init = ch.name.slice(0,2).toUpperCase();
      const logoEl = ch.logo
        ? `<img src="${ch.logo}" onerror="this.style.display='none'" loading="lazy"/>`
        : init;
      html += `<div class="ch-item${ch.fi===activeIdx?' active':''}" onclick="playAt(${ch.fi})">
        <span class="ch-num">${String(num++).padStart(3,'0')}</span>
        <div class="ch-logo">${logoEl}</div>
        <div class="ch-name">${ch.name}</div>
      </div>`;
    });
  }
  list.innerHTML = html;
}

function filterChannels() {
  const q = document.getElementById('search').value.toLowerCase();
  filtered = q ? allChannels.filter(c =>
    c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q)
  ) : [...allChannels];
  renderList();
}

function playAt(idx) {
  activeIdx = idx;
  const ch = filtered[idx];
  if (!ch) return;

  document.getElementById('errorScreen').classList.remove('show');
  document.getElementById('npTitle').textContent = ch.name;
  document.getElementById('npGroup').textContent = ch.group;
  renderList();

  const video = document.getElementById('video');
  if (hls) { hls.destroy(); hls = null; }

  const url = ch.url;
  if (Hls.isSupported()) {
    hls = new Hls({ enableWorker: true, lowLatencyMode: true });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    hls.on(Hls.Events.ERROR, (_, d) => {
      if (d.fatal) showError(ch.name);
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play().catch(() => {});
  } else {
    video.src = url;
    video.play().catch(() => {});
  }

  // Scroll active into view
  setTimeout(() => {
    const el = document.querySelector('.ch-item.active');
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 50);
}

function showError(name) {
  document.getElementById('errorTitle').textContent = `"${name}" unavailable`;
  document.getElementById('errorScreen').classList.add('show');
}

function retryStream() {
  if (activeIdx >= 0) {
    document.getElementById('errorScreen').classList.remove('show');
    playAt(activeIdx);
  }
}

function prevCh() { if (activeIdx > 0) playAt(activeIdx - 1); }
function nextCh() { if (activeIdx < filtered.length - 1) playAt(activeIdx + 1); }

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') { e.preventDefault(); prevCh(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); nextCh(); }
});

// Boot: fetch playlist via proxy
async function init() {
  try {
    const res = await fetch('/api/stream');
    if (!res.ok) throw new Error('Failed');
    const txt = await res.text();
    allChannels = parseM3U(txt);
    filtered = [...allChannels];
    document.getElementById('chCount').textContent = `${allChannels.length} channels`;
    document.getElementById('loadingScreen').classList.add('hidden');
    renderList();
    if (allChannels.length > 0) playAt(0);
  } catch(e) {
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('errorTitle').textContent = 'Could not load playlist';
    document.getElementById('errorMsg').textContent = 'Check your M3U_URL environment variable in Vercel.';
    document.getElementById('errorScreen').classList.add('show');
    document.getElementById('chCount').textContent = 'Error';
  }
}

init();
</script>
</body>
</html>
